<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 280" fill="none">
  <rect width="160" height="280" rx="12" fill="#f0f5ff"/>
  <!-- Partial ring handles -->
  <path d="M44 75 Q26 62 28 44 Q30 26 48 28 Q66 30 64 48" fill="none" stroke="#1e3566" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M116 75 Q134 62 132 44 Q130 26 112 28 Q94 30 96 48" fill="none" stroke="#1e3566" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Two shanks crossing -->
  <line x1="44" y1="75" x2="88" y2="195" stroke="#1e3566" stroke-width="4" stroke-linecap="round"/>
  <line x1="116" y1="75" x2="72" y2="195" stroke="#1e3566" stroke-width="4" stroke-linecap="round"/>
  <!-- Pivot at crossing -->
  <circle cx="80" cy="135" r="9" fill="#c7d7f5" stroke="#1e3566" stroke-width="2.5"/>
  <!-- Highlighted ratchet box -->
  <rect x="52" y="155" width="56" height="16" rx="3" fill="#fef9c3" stroke="#d97706" stroke-width="2.5"/>
  <line x1="62" y1="155" x2="62" y2="171" stroke="#d97706" stroke-width="2"/>
  <line x1="70" y1="155" x2="70" y2="171" stroke="#d97706" stroke-width="2"/>
  <line x1="78" y1="155" x2="78" y2="171" stroke="#d97706" stroke-width="2"/>
  <line x1="86" y1="155" x2="86" y2="171" stroke="#d97706" stroke-width="2"/>
  <line x1="94" y1="155" x2="94" y2="171" stroke="#d97706" stroke-width="2"/>
  <line x1="100" y1="155" x2="100" y2="171" stroke="#d97706" stroke-width="2"/>
  <!-- Arrow pointing to ratchet -->
  <path d="M80 180 L80 195" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
  <path d="M74 190 L80 200 L86 190" fill="#d97706"/>
  <text x="80" y="215" text-anchor="middle" font-size="8" fill="#d97706" font-family="system-ui,sans-serif" font-weight="700">RATCHET BOX</text>
  <text x="80" y="268" text-anchor="middle" font-size="9" fill="#4a5568" font-family="system-ui,sans-serif" font-weight="600">Ratchet Mechanism</text>
</svg>
