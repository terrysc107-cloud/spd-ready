<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 280" fill="none">
  <rect width="160" height="280" rx="12" fill="#f0f5ff"/>
  <!-- Pistol grip body -->
  <path d="M55 185 L105 185 L105 175 L90 165 L90 155 L70 155 L70 165 L55 175 Z" fill="#c7d7f5" stroke="#1e3566" stroke-width="2.5"/>
  <!-- Grip handle hanging down -->
  <path d="M62 185 L58 240 Q57 252 68 254 L92 254 Q103 252 102 240 L98 185 Z" fill="#c7d7f5" stroke="#1e3566" stroke-width="2.5"/>
  <!-- Grip texture lines -->
  <line x1="62" y1="200" x2="98" y2="200" stroke="#1e3566" stroke-width="1"/>
  <line x1="61" y1="214" x2="99" y2="214" stroke="#1e3566" stroke-width="1"/>
  <line x1="60" y1="228" x2="100" y2="228" stroke="#1e3566" stroke-width="1"/>
  <!-- Trigger/finger ring -->
  <ellipse cx="80" cy="152" rx="14" ry="11" fill="none" stroke="#1e3566" stroke-width="2.5"/>
  <!-- Long thin shaft -->
  <rect x="77" y="36" width="6" height="120" rx="3" fill="#c7d7f5" stroke="#1e3566" stroke-width="2"/>
  <!-- Small jaws at tip (open) -->
  <path d="M77 40 Q70 30 70 20 Q70 14 80 14" stroke="#1e3566" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M83 40 Q90 30 90 20 Q90 14 80 14" stroke="#1e3566" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Insulation marker -->
  <rect x="76" y="60" width="8" height="6" rx="1" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="80" y="268" text-anchor="middle" font-size="9" fill="#4a5568" font-family="system-ui,sans-serif" font-weight="600">Laparoscopic Grasper</text>
</svg>
