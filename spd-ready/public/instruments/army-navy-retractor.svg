<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 280" fill="none">
  <rect width="160" height="280" rx="12" fill="#f0f5ff"/>
  <!-- Main flat handle body -->
  <rect x="65" y="90" width="30" height="130" rx="5" fill="#c7d7f5" stroke="#1e3566" stroke-width="2.5"/>
  <!-- Finger ridges on handle -->
  <line x1="65" y1="115" x2="95" y2="115" stroke="#1e3566" stroke-width="1.5"/>
  <line x1="65" y1="130" x2="95" y2="130" stroke="#1e3566" stroke-width="1.5"/>
  <line x1="65" y1="145" x2="95" y2="145" stroke="#1e3566" stroke-width="1.5"/>
  <line x1="65" y1="160" x2="95" y2="160" stroke="#1e3566" stroke-width="1.5"/>
  <line x1="65" y1="175" x2="95" y2="175" stroke="#1e3566" stroke-width="1.5"/>
  <!-- Top blade (curves away from you - right) -->
  <path d="M95 100 Q120 100 124 88 Q126 76 114 70 L88 68" fill="#c7d7f5" stroke="#1e3566" stroke-width="2.5"/>
  <!-- Top blade end rounded -->
  <path d="M88 68 Q80 66 80 74 Q80 82 88 82 L95 80" fill="#c7d7f5" stroke="#1e3566" stroke-width="2"/>
  <!-- Bottom blade (curves opposite - left) -->
  <path d="M65 210 Q40 210 36 222 Q34 234 46 240 L72 240" fill="#c7d7f5" stroke="#1e3566" stroke-width="2.5"/>
  <!-- Bottom blade end rounded -->
  <path d="M72 240 Q80 242 80 234 Q80 226 72 226 L65 224" fill="#c7d7f5" stroke="#1e3566" stroke-width="2"/>
  <!-- Annotation -->
  <text x="80" y="268" text-anchor="middle" font-size="9" fill="#4a5568" font-family="system-ui,sans-serif" font-weight="600">Army-Navy Retractor</text>
</svg>
